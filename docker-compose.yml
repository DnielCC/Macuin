version: '3.8'

services:
  # Base de Datos PostgreSQL
  postgres:
    image: postgres:15
    container_name: macuin_db
    restart: always
    environment:
      POSTGRES_USER: macuin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: DB_macuin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - macuin_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U macuin -d DB_macuin" ]
      interval: 5s
      retries: 5
      timeout: 5s

  # API FastAPI
  api:
    build: ./API
    container_name: macuin_api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://macuin:123456@postgres:5432/DB_macuin
      - CORS_ORIGINS=http://localhost:5001,http://localhost:8003,http://macuin_flask:5001,http://macuin_laravel:8000
      - API_BASIC_USER=alidaniel
      - API_BASIC_PASSWORD=123456
      - PORTAL_CONTACTO_SYNC_TOKEN=macuin_dev_portal_contact_sync
    volumes:
      - ./API:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - macuin_network
    restart: unless-stopped

  # Aplicación Flask
  flask:
    build: ./Flask
    container_name: macuin_flask
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_PORT=5001
      - API_BASE_URL=http://macuin_api:8000
      - API_BASIC_USER=alidaniel
      - API_BASIC_PASSWORD=123456
    volumes:
      - ./Flask:/app
    command: gunicorn --reload -w 4 --threads 2 -b 0.0.0.0:5001 "main:create_app()"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - macuin_network
    restart: unless-stopped

  # Aplicación Laravel
  laravel:
    build: ./Laravel
    container_name: macuin_laravel
    ports:
      - "8003:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8003
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=DB_macuin
      - DB_USERNAME=macuin
      - DB_PASSWORD=123456
      - API_BASE_URL=http://macuin_api:8000
      - MACUIN_PORTAL_CONTACT_SYNC_TOKEN=macuin_dev_portal_contact_sync
    volumes:
      - ./Laravel:/var/www/html
      # zz- fuerza que este .ini gane sobre docker-php-ext-opcache.ini (revalidación en caliente).
      - ./Laravel/php-dev.ini:/usr/local/etc/php/conf.d/zz-macuin-opcache.ini
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - macuin_network
    restart: unless-stopped

networks:
  macuin_network:
    driver: bridge

volumes:
  postgres_data:
