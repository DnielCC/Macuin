version: '3.8'

services:
  # API FastAPI
  api:
    build: ./API
    container_name: macuin_api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    volumes:
      - ./API:/app
    networks:
      - macuin_network
    restart: unless-stopped

  # Aplicación Flask
  flask:
    build: ./Flask
    container_name: macuin_flask
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5000
    networks:
      - macuin_network
    restart: unless-stopped

  # Aplicación Laravel
  laravel:
    build: ./Laravel
    container_name: macuin_laravel
    ports:
      - "8002:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8002
    volumes:
      - ./Laravel:/var/www/html
    networks:
      - macuin_network
    restart: unless-stopped

networks:
  macuin_network:
    driver: bridge
