{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4">
  <h2 class="fw-bold">Pedidos (almacén)</h2>
  <p class="text-muted">Solo estatus <strong>Surtiendo</strong> y <strong>Empacado</strong>.</p>
  <div class="card border-0 shadow-sm rounded-4 p-4">
    <table class="table">
      <thead><tr><th>ID</th><th>Cliente</th><th>Total</th><th>Estatus</th><th>Acción</th></tr></thead>
      <tbody>
        {% for p in pedidos %}
        <tr>
          <td>#{{ p.id }}</td>
          <td>{{ p._cliente_nombre }}</td>
          <td>{{ p.total }}</td>
          <td>{{ p._estatus_nombre }}</td>
          <td>
            <form method="post" action="{{ url_for('almacen_pedidos_estatus', pedido_id=p.id) }}" class="d-flex gap-1">
              <button type="submit" name="estatus" value="Surtiendo" class="btn btn-sm btn-outline-warning">Surtiendo</button>
              <button type="submit" name="estatus" value="Empacado" class="btn btn-sm btn-outline-primary">Empacado</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-muted">Sin pedidos.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
