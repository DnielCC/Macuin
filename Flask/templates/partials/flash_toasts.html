{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div id="macuin-toast-stack" class="macuin-toast-stack" aria-live="polite" aria-atomic="false"></div>
<style>
.macuin-toast-stack {
  position: fixed;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 1090;
  max-width: min(440px, 94vw);
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  pointer-events: none;
}
.macuin-toast-stack .macuin-toast {
  pointer-events: auto;
  margin: 0;
  font-size: 0.875rem;
  line-height: 1.38;
  box-shadow: 0 6px 20px rgba(15, 23, 42, 0.14);
  border: none;
  border-radius: 0.5rem;
  animation: macuinToastIn 0.26s ease-out;
}
@keyframes macuinToastIn {
  from { opacity: 0; transform: translateX(14px); }
  to { opacity: 1; transform: translateX(0); }
}
.macuin-toast.macuin-toast-hiding {
  opacity: 0;
  transform: translateX(10px);
  transition: opacity 0.32s ease, transform 0.32s ease;
}
</style>
<script>
(function () {
  var items = [
    {% for category, message in messages %}
    { cat: {{ category|tojson }}, msg: {{ message|tojson }} }{% if not loop.last %},{% endif %}
    {% endfor %}
  ];
  var stack = document.getElementById('macuin-toast-stack');
  if (!stack || !items.length) return;
  var map = { danger: 'danger', success: 'success', warning: 'warning', info: 'info', primary: 'primary', secondary: 'secondary', dark: 'dark' };
  items.forEach(function (item, i) {
    var cat = map[item.cat] || 'secondary';
    var el = document.createElement('div');
    el.className = 'alert alert-' + cat + ' macuin-toast mb-0 py-2 px-3';
    el.setAttribute('role', 'status');
    el.textContent = item.msg;
    stack.appendChild(el);
    window.setTimeout(function () {
      el.classList.add('macuin-toast-hiding');
      window.setTimeout(function () {
        el.remove();
        if (stack && !stack.children.length) stack.remove();
      }, 380);
    }, 6200 + i * 320);
  });
})();
</script>
{% endif %}
{% endwith %}
